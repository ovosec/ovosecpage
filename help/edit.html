
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wangEditor simple mode</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link href="https://unpkg.com/@wangeditor/editor@latest/dist/css/style.css" rel="stylesheet">
    <style>
        html,
        body {
            margin: 20px;
            height: 100%;
            padding: 0;
        }

        body {
            display: flex;
        }

        #lzg-editor {
            border: 1px solid #ccc;
        }

        .left {
            border-right: 1px solid #ccc;
            min-width: 400px;
            width: 400px;
            margin-right: 20px;
            padding-right: 10px;
        }

        ul {
            margin: 5px 0;
        }

        li {
            cursor: pointer;
            margin: 7px 0;
            user-select: none;
        }

        .editClick:hover,
        .deleteClick:hover {
            background: #f3f3f3;
        }

        .editClick {
            margin-left: 10px;
            color: #2196F3;
        }

        .deleteClick {
            margin-left: 10px;
            color: red;
        }

        .cancel {
            background: #f79989;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            margin-right: 20px;
            display: none;
            cursor: pointer;
        }

        .submit {
            background: #2196F3;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
        }

        .loader {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
            margin: 25% 45%;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="left" id="left">
        <div style="display:flex;justify-content: space-between;align-items: center">
            <div style="text-align: center;">Category Management</div>
            <button onclick="openDialog1()"
                style="background: #2196F3;color: white;border: none;padding: 5px 10px;border-radius: 8px;">Add Category</button>
        </div>
        <ul class="tree" id="tree"></ul>
    </div>

    <div class="right">
        <div style="display: flex;align-items: center;margin-bottom: 10px;">Category:
            <select id="languageList"></select>
            &emsp;--&emsp;
            <select id="classifyList">
                <option value="">Select language first</option>
            </select>
        </div>
        <div style="display: flex;align-items: center;margin-bottom: 10px;">Title:<textarea style="flex: 1;"
                id="titleText"></textarea>
        </div>
        <div style="display: flex;align-items: center;margin-bottom: 10px;">Subtitle:<textarea style="flex: 1;"
                id="subtitleText"></textarea></div>
        <div id="lzg-editor">
            <div id="editor-toolbar" style="border-bottom: 1px solid #ccc;"></div>
            <div id="editor-text-area" style="height: 100%"></div>
        </div>
        <div id="loader">
            <div class="loader"></div>
        </div>
        <div style="display: flex;justify-content: center;padding: 40px;">
            <button id="cancel" class="cancel">Cancel Edit</button>
            <button id="submit" class="submit">Add</button>
        </div>
    </div>

    <dialog id="myDialog1">
        <div style="display: flex;justify-content: space-between;">
            <div>Add Category</div>
            <button class="close" onclick="closeDialog1()">×</button>
        </div>
        <div style="margin: 15px 0;">Parent:<select id="myDialog1-list">
                <option value="">Please Select</option>
            </select></div>
        <textarea placeholder="Main Title" id="myDialog1-input1"></textarea>
        <textarea placeholder="Subtitle" id="myDialog1-input2"></textarea>
        <textarea placeholder="Language Code" id="myDialog1-input3"></textarea>
        <div style="margin: 15px 0;"></div>
        <button id="myDialog1-submit">Add</button>
    </dialog>

    <dialog id="myDialog2">
        <div style="display: flex;justify-content: space-between;">
            <div>Modify</div>
            <button class="close" onclick="closeDialog2()">×</button>
        </div>
        <span id="myDialog2-content1" style="display: none;"></span>
        <span id="myDialog2-content2" style="display: none;"></span>
        <div style="margin: 15px 0;"></div>
        <textarea placeholder="Main Title" id="myDialog2-input1"></textarea>
        <textarea placeholder="Subtitle" id="myDialog2-input2"></textarea>
        <textarea placeholder="Language Code" id="myDialog2-input3"></textarea>
        <div style="margin: 15px 0;"></div>
        <button id="myDialog2-submit">Confirm</button>
    </dialog>

    <dialog id="myDialog3">
        <div style="display: flex;justify-content: space-between;">
            <div>Delete</div>
            <button class="close" onclick="closeDialog3()">×</button>
        </div>
        <div style="color: red;margin: 20px;">&emsp;&emsp;Are you sure you want to delete?
            <span id="myDialog3-content1" style="display: none;"></span>
            <span id="myDialog3-content2" style="display: none;"></span>
            &emsp;&emsp;
        </div>
        <button id="myDialog3-submit">Confirm</button>
    </dialog>

</body>
<script src="./js/help.js"></script>
<script src="https://unpkg.com/@wangeditor/editor@latest/dist/index.js"></script>
<script>
    let languageId = ''
    let addLanguageId = ''
    let classifyId = ''
    let contentId = ''
    let title = ''
    let subtitle = ''
    let content = ''
    let contentText=''
    const languageList = document.getElementById("languageList")
    const classifyList = document.getElementById("classifyList")
    const titleText = document.getElementById("titleText")
    const subtitleText = document.getElementById("subtitleText")
    languageList.addEventListener('change', function () {
        languageId = this.value
        getClassify(this.value)
    })
    document.getElementById("myDialog1-list").addEventListener('change', function () {
        addLanguageId = this.value
        if (addLanguageId == '') {
            document.getElementById("myDialog1-input2").style.display = ''
            document.getElementById("myDialog1-input3").style.display = ''
        } else {
            document.getElementById("myDialog1-input2").style.display = 'none'
            document.getElementById("myDialog1-input3").style.display = 'none'
        }
    })
    classifyList.addEventListener('change', function () {
        classifyId = this.value
    })
    titleText.addEventListener('change', function () {
        title = this.value
    })
    subtitleText.addEventListener('change', function () {
        subtitle = this.value
    })

    function init() {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', baseUrl + '/help/languageAndContentCount', true);
        xhr.onload = function () {
            if (this.status === 200) {
                let innerHTML = ' <option value="">Please Select</option>'
                JSON.parse(this.responseText).forEach(element => {
                    innerHTML = innerHTML + `
                <option value="${element.id}">${element.title}</option>
                `
                });
                languageList.innerHTML = innerHTML
                document.getElementById("myDialog1-list").innerHTML = innerHTML
            }
        };
        xhr.send();
    }
    init()

    function getAll() {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', baseUrl + '/help/getAll', true);
        xhr.onload = function () {
            if (this.status === 200) {
                let innerHTML = ''
                JSON.parse(this.responseText).forEach((element) => {
                    innerHTML = innerHTML + `
                        <li class="expanded">
                            ${element.title} (${element.classify.length})
                            <span class="editClick" onclick="editClick(event,1,${element.id})">Edit</span>
                            <span class="deleteClick" onclick="deleteClick(event,1,${element.id})">Delete</span>
                            <ul>
                                ${element.classify.map(classifyItem => `
                                    <li>
                                        ${classifyItem.title} (${classifyItem.contentNameList.length})
                                        <span class="editClick" onclick="editClick(event,2,${classifyItem.id})">Edit</span>
                                        <span class="deleteClick" onclick="deleteClick(event,2,${classifyItem.id})">Delete</span>
                                        <ul>  
                                            ${classifyItem.contentNameList.map(contentNameItem => `
                                                <li>${contentNameItem.title}
                                                    <span class="editClick" onclick="editClick(event,3,${contentNameItem.id})">Edit</span>
                                                    <span class="deleteClick" onclick="deleteClick(event,3,${contentNameItem.id})">Delete</span>
                                                </li>
                                            `).join('')}
                                        </ul> 
                                    </li>   
                                `).join('')}   
                            </ul>  
                        </li> `
                });
                document.getElementById('tree').innerHTML = innerHTML
            }
        };
        xhr.send();
    }
    getAll()

    function getClassify(id, value) {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', baseUrl + '/help/classifyAndContentList?id=' + id, true);
        xhr.onload = function () {
            if (this.status === 200) {
                let innerHTML = ' <option value="">Please Select</option>'
                JSON.parse(this.responseText).forEach(element => {
                    innerHTML = innerHTML + `
                        <option value="${element.id}">${element.title}</option>
                    `
                });
                classifyList.innerHTML = innerHTML
                if (value) { classifyList.value = value }
            }
        };
        xhr.send();
    }

    document.getElementById('submit').addEventListener('click', function () {
        if (languageId === '' || classifyId === '' || content == '' || title == '') {
            alert("Category, Title, and Content are required")
            return
        }
        if (contentId == '') {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', baseUrl + '/help/pushContent', true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onload = function () {
                if (this.status === 200) {
                    alert("Added successfully")
                    window.location.reload()
                    init()
                    getAll()
                }
            }
            xhr.send(JSON.stringify({
                languageId: languageId,
                classifyId: classifyId,
                title: title,
                subtitle: subtitle,
                content: content,
                contentText:contentText,
                lzg:window.location.search
            }))
        } else {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', baseUrl + '/help/updateContent', true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onload = function () {
                if (this.status === 200) {
                    alert("Modified successfully")
                    window.location.reload()
                    init()
                    getAll()
                }
            }
            xhr.send(JSON.stringify({
                id: contentId,
                languageId: languageId,
                classifyId: classifyId,
                title: title,
                subtitle: subtitle,
                content: content,
                contentText:contentText,
                lzg:window.location.search
            }))
        }
    })
    document.getElementById('cancel').addEventListener('click', function () {
        document.getElementById('lzg-editor').style.display = 'none'
        document.getElementById('loader').style.display = 'block'
        document.getElementById('cancel').style.display = 'none'
        document.getElementById('submit').innerHTML = 'Add'
        languageList.value = ''
        classifyList.value = ''
        languageId = ''
        classifyId = ''
        titleText.value = ''
        subtitleText.value = ''
        contentId = ''
        title = ''
        subtitle = ''
        content =''
        setTimeout(() => editor.setHtml(''), 100)
    })

    function openDialog1() {
        var dialog = document.getElementById('myDialog1');
        dialog.showModal();
    }
    function closeDialog1() {
        var dialog = document.getElementById('myDialog1');
        dialog.close();
    }
    document.getElementById('myDialog1-submit').addEventListener('click', function () {
        if (document.getElementById("myDialog1-input1").value == '') {
            alert("Main Title is required")
            return
        }
        if (addLanguageId == '') {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', baseUrl + '/help/pushLanguage', true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onload = function () {
                if (this.status === 200) {
                    init()
                    getAll()
                    alert("Added successfully")
                    closeDialog1()
                }
            }
            xhr.send(JSON.stringify({
                title: document.getElementById("myDialog1-input1").value,
                subtitle: document.getElementById("myDialog1-input2").value,
                language: document.getElementById("myDialog1-input3").value,
                lzg:window.location.search
            }))
        } else {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', baseUrl + '/help/pushClassify', true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onload = function () {
                if (this.status === 200) {
                    init()
                    getAll()
                    alert("Added successfully")
                    closeDialog1()
                }
            }
            xhr.send(JSON.stringify({
                title: document.getElementById("myDialog1-input1").value,
                languageId: addLanguageId,
                lzg:window.location.search
            }))
        }
    })


    function editClick(event, type, id) {
        event.stopPropagation();
        let url = ''
        switch (type) {
            case 1: url = 'languageById'; break;
            case 2: url = 'classifyById'; break;
            case 3: url = 'contentById'; break;
        }
        document.getElementById('myDialog2-content1').innerHTML = type;
        document.getElementById('myDialog2-content2').innerHTML = id;
        const xhr = new XMLHttpRequest();
        xhr.open('GET', baseUrl + '/help/' + url + '?id=' + id, true);
        xhr.onload = function () {
            if (this.status === 200) {
                let data = JSON.parse(this.responseText)
                switch (type) {
                    case 1:
                        document.getElementById("myDialog2-input1").value = data.title
                        document.getElementById("myDialog2-input2").style.display = ''
                        document.getElementById("myDialog2-input3").style.display = ''
                        document.getElementById("myDialog2-input2").value = data.subtitle
                        document.getElementById("myDialog2-input3").value = data.language
                        document.getElementById('myDialog2').showModal()
                        break;
                    case 2:
                        document.getElementById("myDialog2-input1").value = data.title
                        document.getElementById("myDialog2-input2").style.display = 'none'
                        document.getElementById("myDialog2-input3").style.display = 'none'
                        document.getElementById('myDialog2').showModal()
                        break;
                    case 3:
                        document.getElementById('lzg-editor').style.display = 'none'
                        document.getElementById('loader').style.display = 'block'
                        document.getElementById('cancel').style.display = 'block'
                        document.getElementById('submit').innerHTML = 'Confirm'

                        languageList.value = data.languageId
                        getClassify(data.languageId, data.classifyId)
                        titleText.value = data.title
                        subtitleText.value = data.subtitle
                        languageId = data.languageId
                        classifyId = data.classifyId
                        contentId = data.id
                        title = data.title
                        subtitle = data.subtitle
                        content = data.content
                        setTimeout(() => editor.setHtml(data.content), 100)
                        break;
                }
            }
        };
        xhr.send();
    }
    function closeDialog2() {
        var dialog = document.getElementById('myDialog2');
        dialog.close();
    }
    document.getElementById('myDialog2-submit').addEventListener('click', function () {
        const type = document.getElementById('myDialog2-content1').innerHTML
        const id = document.getElementById('myDialog2-content2').innerHTML
        if (document.getElementById("myDialog2-input1").value == '') {
            alert("Main Title is required")
            return
        }

        if (type == '1') {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', baseUrl + '/help/updateLanguage', true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onload = function () {
                if (this.status === 200) {
                    init()
                    getAll()
                    alert("Modified successfully")
                    closeDialog2()
                }
            }
            xhr.send(JSON.stringify({
                id: id,
                title: document.getElementById("myDialog2-input1").value,
                subtitle: document.getElementById("myDialog2-input2").value,
                language: document.getElementById("myDialog2-input3").value,
                lzg:window.location.search
            }))
        }
        if (type == '2') {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', baseUrl + '/help/updateClassify', true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onload = function () {
                if (this.status === 200) {
                    init()
                    getAll()
                    alert("Modified successfully")
                    closeDialog2()
                }
            }
            xhr.send(JSON.stringify({
                id: id,
                title: document.getElementById("myDialog2-input1").value,
                lzg:window.location.search
            }))
        }
    })


    function deleteClick(event, index, id) {
        event.stopPropagation();
        document.getElementById('myDialog3-content1').innerHTML = index;
        document.getElementById('myDialog3-content2').innerHTML = id;
        var dialog = document.getElementById('myDialog3');
        dialog.showModal();
    }
    function closeDialog3() {
        var dialog = document.getElementById('myDialog3');
        dialog.close();
    }
    document.getElementById('myDialog3-submit').addEventListener('click', function () {
        const index = document.getElementById('myDialog3-content1').innerHTML
        const id = document.getElementById('myDialog3-content2').innerHTML
        if (index == '1') {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', baseUrl + '/help/deleteLanguage', true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onload = function () {
                if (this.status === 200) {
                    alert("Deleted successfully")
                    closeDialog3()
                    getAll()
                    init()
                }
            }
            xhr.send(JSON.stringify({
                id: id,
                lzg:window.location.search
            }))
        }
        if (index == '2') {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', baseUrl + '/help/deleteClassify', true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onload = function () {
                if (this.status === 200) {
                    alert("Deleted successfully")
                    closeDialog3()
                    getAll()
                    init()
                }
            }
            xhr.send(JSON.stringify({
                id: id,
                lzg:window.location.search
            }))
        }
        if (index == '3') {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', baseUrl + '/help/deleteContent', true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.onload = function () {
                if (this.status === 200) {
                    alert("Deleted successfully")
                    closeDialog3()
                    getAll()
                    init()
                }
            }
            xhr.send(JSON.stringify({
                id: id,
                lzg:window.location.search
            }))
        }
    })




    const E = window.wangEditor
    let html = ``
    window.editor = E.createEditor({
        selector: '#editor-text-area',
        html,
        mode: 'simple',
        config: {
            placeholder: 'Type here...',
            MENU_CONF: {
                uploadImage: {
                    fieldName: 'your-fileName',
                    base64LimitSize: 10 * 1024 * 1024 // 10M Below base64
                }
            },
            onChange() {
                content = editor.getHtml()
                contentText = editor.getText()
                document.getElementById('lzg-editor').style.display = 'block'
                document.getElementById('loader').style.display = 'none'
                console.log(editor.getHtml())
                console.log(editor.getText())
                console.log(editor.getHtml().length)
            }
        }
    })

    window.toolbar = E.createToolbar({
        editor,
        mode: 'simple',
        selector: '#editor-toolbar',
        config: {}
    })


    document.querySelector('.tree').addEventListener('click', function (e) {
        var li = e.target.closest('li');
        if (!li || li.tagName.toLowerCase() !== 'li') return;
        if (e.target.tagName.toLowerCase() === 'a') return;
        var ul = li.querySelector('ul');
        if (ul) {
            li.classList.toggle('expanded');
            li.classList.toggle('collapsed');
            ul.style.display = li.classList.contains('expanded') ? 'block' : 'none';
        }
        e.stopPropagation();
    });

</script>

</html>
